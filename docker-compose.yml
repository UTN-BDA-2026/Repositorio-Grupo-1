version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: habits_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongo_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-mongo_root}
      MONGO_INITDB_DATABASE: ${DB_NAME:-habits_db}
      MONGO_APP_USER: ${DB_USER:-habits_app}
      MONGO_APP_PASS: ${DB_PASS:-pruebatpfinal}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro

  mongo-express:
    image: mongo-express:1.0.2
    container_name: habits_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-mongo_root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-mongo_root}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-admin}

volumes:
  mongo_data:
